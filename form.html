<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TechNova Solutions Job Application</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- External CSS -->
<link rel="stylesheet" href="style.css">

<script>

function validateForm(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;

let interests=document.querySelectorAll('input[name="interest"]:checked');

if(name=="" || email=="" || phone==""){
alert("Name, Email and Telephone cannot be empty.");
return false;
}

if(interests.length==0){
alert("Please select at least one Area of Interest.");
return false;
}

return true;

}

</script>

</head>

<body>

<div class="container">

<div class="container-box">

<h2>TechNova Solutions Job Application</h2>

<form onsubmit="return validateForm()">

<!-- Personal Information -->

<div class="section-title">1. Personal Information</div>

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" id="name">
</div>

<div class="mb-3">
<label class="form-label">Email Address</label>
<input type="email" class="form-control" id="email">
</div>

<div class="mb-3">
<label class="form-label">Telephone Number</label>
<input type="tel" class="form-control" id="phone">
</div>

<div class="mb-3">
<label class="form-label">Physical Address</label>
<input type="text" class="form-control">
</div>

<!-- Position Information -->

<div class="section-title">2. Position Information</div>

<div class="mb-3">
<label class="form-label">Desired Job Title</label>

<select class="form-select">
<option selected disabled>Select Position</option>
<option>Software Developer</option>
<option>Data Analyst</option>
<option>Marketing Specialist</option>
<option>IT Support</option>
</select>

</div>

<div class="mb-3">

<label class="form-label">Employment Type</label><br>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Full Time</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Part Time</label>
</div>

</div>

<!-- Areas of Interest -->

<div class="section-title">3. Areas of Interest</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="interest">
<label class="form-check-label">Account Executive</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="interest">
<label class="form-check-label">Business Developer</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="interest">
<label class="form-check-label">Inside Sales</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" name="interest">
<label class="form-check-label">Sales Manager</label>
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox" name="interest">
<label class="form-check-label">VP Sales</label>
</div>

<!-- Relocation -->

<div class="section-title">4. Relocation</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="relocation">
<label class="form-check-label">Yes</label>
</div>

<div class="form-check form-check-inline mb-3">
<input class="form-check-input" type="radio" name="relocation">
<label class="form-check-label">No</label>
</div>

<!-- Additional Message -->

<div class="section-title">5. Additional Message</div>

<div class="mb-3">

<textarea class="form-control" rows="4" placeholder="Explain briefly why you are suitable for the role"></textarea>

</div>

<!-- Form Controls -->

<div class="section-title">6. Form Controls</div>

<button type="submit" class="btn btn-primary">Submit Application</button>

<button type="reset" class="btn btn-secondary">Reset</button>

</form>

</div>

</div>

</body>
</html>
